{% extends 'layout.html' %}

{% block title %}
Détail du produit
{% endblock %}

{% block content %}
<h3>{{ product.name }}</h3>
<h3>{{ product.price }}</h3>
<h3>{{ product.description }}</h3>
{% if product.image %}
  <img src="{{ product.image.url }}" width="200" height="200">
{% endif %}
<br><br>
<a href="{% url 'product_list' %}">Retour</a>
{% endblock %}
