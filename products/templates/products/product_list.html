{% extends 'layout.html' %}

{% block title %}
Liste de produits
{% endblock %}

{% block content %}
<ul>
  {% for p in products %}
  <li>
    {{ p.name }}
    {{ p.price }}
    {{ p.description }}
    {% if p.image %}
      <img src="{{ p.image.url }}" width="100" height="100">
    {% endif %}
    <a href="{% url 'product_detail' p.id %}">Détails</a>
  </li>
  {% endfor %}
</ul>
{% endblock %}
