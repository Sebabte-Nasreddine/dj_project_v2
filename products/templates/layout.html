<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-EVSTQN3/azPrG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
        crossorigin="anonymous">
</head>
<body>
  <header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="{% url 'product_list' %}">E-Commerce</a>
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNavAltMarkup"
                aria-controls="navbarNavAltMarkup"
                aria-expanded="false"
                aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
          <div class="navbar-nav">
            <a class="nav-link active" href="{% url 'product_list' %}">Accueil</a>
            <a class="nav-link" href="{% url 'product_list' %}">Produits</a>
            {% if user.is_authenticated %}
              <a class="nav-link" href="{% url 'profile' %}">Mon profil</a>
              <span class="navbar-text text-white mx-3">
                Bonjour, {{ user.username }}
              </span>
              <form method="post" action="{% url 'logout' %}" class="d-inline">
                {% csrf_token %}
                <button type="submit" class="btn btn-outline-light btn-sm">
                  Déconnexion
                </button>
              </form>
            {% else %}
              <a class="nav-link" href="{% url 'login' %}">Connexion</a>
              <a class="nav-link" href="{% url 'signup' %}">Créer un compte</a>
            {% endif %}
          </div>
        </div>
      </div>
    </nav>
  </header>

  <main class="container mt-4">
    {% block content %}
    {% endblock %}
  </main>

  <footer class="text-center mt-5 mb-3">
    Copyright@EMI 2026
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
          integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
          crossorigin="anonymous">
  </script>
</body>
</html>
